<section id="skills" class="py-5 bg-dark">
    <div class="container">
        <h2 class="text-center mb-5 text-primary-yellow">TECHNICAL EXPERTISE</h2>

        <div class="swiper-outer">
            <button class="swiper-nav-btn" (click)="slidePrev()" aria-label="Previous skill group">
                <i class="bi bi-chevron-left" aria-hidden="true"></i>
            </button>

            <swiper-container #swiper
                navigation="false"
                pagination='{"clickable": true}'
                grab-cursor="true"
                loop="true"
                slides-per-view="1"
                space-between="20"
                breakpoints='{"768": {"slidesPerView": 2}, "1200": {"slidesPerView": 2}}'>

                @for (group of model.skillGroups; track group.title) {
                    <swiper-slide>
                        <div class="card h-100 border-0 shadow-sm skill-card">
                            <div class="card-body p-4">
                                <h3 class="h4 mb-4 border-bottom pb-2 border-secondary text-primary-yellow text-center">
                                    {{ group.title }}
                                </h3>
                                <div class="d-flex flex-column gap-3">
                                    @for (skill of group.skills; track skill.name) {
                                        <div class="d-flex align-items-center">
                                            <div class="bg-primary-yellow text-black rounded-circle d-flex align-items-center justify-content-center me-3"
                                                 style="width:32px;height:32px;flex-shrink:0;">
                                                <i class="bi" [class]="skill.iconClass || 'bi-check2'" aria-hidden="true"></i>
                                            </div>
                                            <span class="text-light">{{ skill.name }}</span>
                                        </div>
                                    }
                                </div>
                            </div>
                        </div>
                    </swiper-slide>
                }
            </swiper-container>

            <button class="swiper-nav-btn" (click)="slideNext()" aria-label="Next skill group">
                <i class="bi bi-chevron-right" aria-hidden="true"></i>
            </button>
        </div>

        <!-- Additional Specializations -->
        <div class="text-center mt-5">
            <h3 class="text-muted mb-3 small text-uppercase fw-bold">Additional Specializations</h3>
            <div class="d-flex flex-wrap justify-content-center gap-2">
                @for (spec of model.additionalSpecializations; track spec) {
                    <span class="badge rounded-pill border border-primary-yellow text-primary-yellow px-3 py-2">{{ spec }}</span>
                }
            </div>
        </div>
    </div>
</section>
