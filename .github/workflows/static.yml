name: Deploy Portfolio.Home to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build and Prerender
      run: npm run build

    - name: Add Pages files
      run: |
        touch ./dist/portfolio/browser/.nojekyll
        cp ./dist/portfolio/browser/index.html ./dist/portfolio/browser/404.html

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist/portfolio/browser'

    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v4
