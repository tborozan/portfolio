<section id="skills" class="py-5 bg-dark">
    <div class="container text-center">
        <h2 class="mb-5 text-primary-yellow section-title">TECHNICAL EXPERTISE</h2>

        <div class="swiper-outer text-start">
            <button class="swiper-nav-btn" (click)="slidePrev()" aria-label="Previous skill group">
                <i class="bi bi-chevron-left" aria-hidden="true"></i>
            </button>

            <swiper-container #swiper
                navigation="false"
                pagination='{"clickable": true}'
                grab-cursor="true"
                loop="true"
                slides-per-view="1"
                space-between="20"
                breakpoints='{"768": {"slidesPerView": 2}, "1200": {"slidesPerView": 2}}'>

                @for (group of model.skillGroups; track group.title) {
                    <swiper-slide>
                        <div class="card h-100 p-4">
                            <h3 class="h5 mb-4 border-bottom pb-2 border-secondary text-primary-yellow text-center font-monospace">
                                {{ group.title }}
                            </h3>
                            <div class="d-flex flex-column gap-3">
                                @for (skill of group.skills; track skill.name) {
                                    <div class="d-flex align-items-center">
                                        <div class="border border-primary-yellow text-primary-yellow d-flex align-items-center justify-content-center me-3 select-none"
                                             style="width:28px;height:28px;flex-shrink:0;border-radius:2px;background:rgba(255,203,71,0.05);">
                                            <i class="bi" [class]="skill.iconClass || 'bi-check2'" aria-hidden="true" style="font-size:0.9rem;"></i>
                                        </div>
                                        <span class="text-light font-monospace">{{ skill.name }}</span>
                                    </div>
                                }
                            </div>
                        </div>
                    </swiper-slide>
                }
            </swiper-container>

            <button class="swiper-nav-btn" (click)="slideNext()" aria-label="Next skill group">
                <i class="bi bi-chevron-right" aria-hidden="true"></i>
            </button>
        </div>

        <!-- Additional Specializations -->
        <div class="text-center mt-5">
            <h3 class="text-muted mb-3 small text-uppercase fw-bold font-monospace">Additional Specializations</h3>
            <div class="d-flex flex-wrap justify-content-center gap-2">
                @for (spec of model.additionalSpecializations; track spec) {
                    <span class="badge rounded-pill border border-primary-yellow text-primary-yellow px-3 py-2 font-monospace">{{ spec }}</span>
                }
            </div>
        </div>
    </div>
</section>
